apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{PROJECT_NAME}}-route
  namespace: {{NAMESPACE}}
spec:
  # Em prod, o STAGE é removido do hostname (ex: my-service.your-domain.com)
  # Em dev/hml, o STAGE é mantido (ex: my-service.dev.your-domain.com)
  # Substitua {{BASE_DOMAIN}} pelo domínio do seu ambiente
  hostnames:
    - {{PROJECT_NAME}}.{{STAGE}}.{{BASE_DOMAIN}}
  parentRefs:
    - name: internal-gateway
      namespace: envoy-gateway-system
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: {{PROJECT_NAME}}
          port: 3000