apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{PROJECT_NAME}}
  namespace: {{NAMESPACE}}
  labels:
    app: {{PROJECT_NAME}}
    environment: {{STAGE}}
spec:
  progressDeadlineSeconds: 600
  replicas: 1
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app: {{PROJECT_NAME}}
  strategy:
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: {{PROJECT_NAME}}
    spec:
      containers:
      - name: {{PROJECT_NAME}}
        # Imagem substituída dinamicamente pela pipeline via sed
        image: {{AWS_ACCOUNT_ID}}.dkr.ecr.us-east-1.amazonaws.com/{{ECR_REPO_NAME}}:{{IMAGE_TAG}}
        imagePullPolicy: Always
        ports:
        - containerPort: 3000
          protocol: TCP
        resources:
          limits:
            cpu: "100m"
            memory: 128Mi
          requests:
            cpu: "10m"
            memory: 32Mi
        # Liveness probe — reinicia o container se não responder
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
          failureThreshold: 3
        # Readiness probe — remove o pod do balanceador se não estiver pronto
        readinessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 5
          failureThreshold: 3
        envFrom:
          - configMapRef:
              name: {{PROJECT_NAME}}-configmap
          - secretRef:
              name: {{PROJECT_NAME}}-secret
      serviceAccountName: {{PROJECT_NAME}}-svc-account