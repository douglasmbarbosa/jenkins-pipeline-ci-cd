apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{PROJECT_NAME}}-svc-account
  namespace: {{NAMESPACE}}
  labels:
    app: {{PROJECT_NAME}}
    environment: {{STAGE}}
  annotations:
    # ARN da IAM Role criada pelo setup-pipelines via IRSA (IAM Roles for Service Accounts)
    eks.amazonaws.com/role-arn: arn:aws:iam::{{AWS_ACCOUNT_ID}}:role/{{PROJECT_NAME}}-role